apiVersion: apps/v1
kind: Deployment
metadata:
  name: globalcmx-frontend
  labels:
    app: globalcmx-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: globalcmx-frontend
  template:
    metadata:
      labels:
        app: globalcmx-frontend
    spec:
      containers:
      - name: frontend
        image: gcr.io/globalcmx-prod/globalcmx-frontend:v1.0.0
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: globalcmx-frontend
  labels:
    app: globalcmx-frontend
spec:
  type: LoadBalancer
  selector:
    app: globalcmx-frontend
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
