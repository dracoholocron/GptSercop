# Deployment de GlobalCMX Backend en GKE
apiVersion: apps/v1
kind: Deployment
metadata:
  name: globalcmx-backend
  labels:
    app: globalcmx-backend
    version: v1.0.0
spec:
  replicas: 2  # Iniciar con 2 réplicas
  selector:
    matchLabels:
      app: globalcmx-backend
  template:
    metadata:
      labels:
        app: globalcmx-backend
        version: v1.0.0
    spec:
      containers:
      - name: backend
        image: gcr.io/globalcmx-prod/globalcmx-backend:v1.0.3
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        # Spring Profile
        - name: SPRING_PROFILES_ACTIVE
          value: "gcp"

        # GCP Project
        - name: GCP_PROJECT_ID
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: gcp-project-id

        # PostgreSQL (Event Store)
        - name: DB_POSTGRES_HOST
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: postgres-host
        - name: DB_POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: postgres-user
        - name: DB_POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: postgres-password

        # MySQL (Read Model)
        - name: DB_MYSQL_HOST
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: mysql-host
        - name: DB_MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: mysql-user
        - name: DB_MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: mysql-password

        # Disable Kafka completely for GCP
        - name: SPRING_AUTOCONFIGURE_EXCLUDE
          value: "org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration"

        # Java Options
        - name: JAVA_OPTS
          value: "-Xms512m -Xmx1024m -XX:+UseG1GC"

        resources:
          requests:
            memory: "768Mi"
            cpu: "250m"
          limits:
            memory: "1536Mi"
            cpu: "1000m"

        # Liveness Probe - verificar que el contenedor está vivo
        livenessProbe:
          httpGet:
            path: /api/actuator/health/liveness
            port: 8080
          initialDelaySeconds: 90
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        # Readiness Probe - verificar que está listo para recibir tráfico
        readinessProbe:
          httpGet:
            path: /api/actuator/health/readiness
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

        # Startup Probe - verificar que la aplicación inició correctamente
        startupProbe:
          httpGet:
            path: /api/actuator/health
            port: 8080
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 60  # Increased to 10 minutes (60 * 10s)

      # Configuración de seguridad
      # securityContext movido a nivel de contenedor para evitar conflictos con fsGroup
      # securityContext:
      #   runAsNonRoot: true
      #   runAsUser: 1000
      #   fsGroup: 1000

---
# Service para exponer el backend
apiVersion: v1
kind: Service
metadata:
  name: globalcmx-backend-service
  labels:
    app: globalcmx-backend
spec:
  type: LoadBalancer
  selector:
    app: globalcmx-backend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
    name: http
  sessionAffinity: ClientIP

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: globalcmx-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: globalcmx-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max
