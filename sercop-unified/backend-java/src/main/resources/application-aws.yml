# =============================================================================
# CONFIGURACIÓN PARA AMAZON WEB SERVICES
# =============================================================================
# Este perfil se activa con: -Dspring.profiles.active=aws
#
# IMPORTANTE: Para usar SNS/SQS en lugar de Kafka, solo necesitas activar
# este perfil. La configuración de messaging.provider se sobrescribe
# automáticamente a SNS_SQS.
# =============================================================================

# -----------------------------------------------------------------------------
# Sistema de Mensajería - AWS usa SNS/SQS
# -----------------------------------------------------------------------------
messaging:
  # Cambiar el proveedor a SNS_SQS para AWS
  provider: SNS_SQS

  enabled: true

  # Los topics son los mismos, solo cambia el proveedor
  # (heredados de application.yml)

  # Configuración específica de SNS/SQS
  aws:
    region: ${AWS_REGION:us-east-1}
    access-key-id: ${AWS_ACCESS_KEY_ID:}
    secret-access-key: ${AWS_SECRET_ACCESS_KEY:}

spring:
  application:
    name: globalcmx-api

  # Deshabilitar autoconfiguraciones que no se usan en AWS
  autoconfigure:
    exclude:
      - com.google.cloud.spring.autoconfigure.pubsub.GcpPubSubAutoConfiguration
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

  # Multi-DataSource Configuration para AWS
  datasource:
    # Event Store (RDS PostgreSQL)
    eventstore:
      jdbc-url: jdbc:postgresql://${DB_POSTGRES_HOST:localhost}:5432/globalcmx_eventstore
      username: ${DB_POSTGRES_USER:postgres}
      password: ${DB_POSTGRES_PASSWORD:postgres123}
      driver-class-name: org.postgresql.Driver
      hikari:
        maximum-pool-size: 10
        minimum-idle: 2
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000

    # Read Model (RDS MySQL)
    readmodel:
      jdbc-url: jdbc:mysql://${DB_MYSQL_HOST:localhost}:3306/globalcmx_read?createDatabaseIfNotExist=true&useSSL=true&requireSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      username: ${DB_MYSQL_USER:globalcmx}
      password: ${DB_MYSQL_PASSWORD:globalcmx123}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 10
        minimum-idle: 2
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000

  # JPA Configuration
  jpa:
    show-sql: false  # Desactivar en producción
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  # Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
    out-of-order: false

  integration:
    poller:
      fixed-delay: 1000

# Server Configuration
server:
  port: ${PORT:8080}
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  tomcat:
    threads:
      max: 200
      min-spare: 10
    connection-timeout: 20000
    max-connections: 10000

# Actuator Configuration para CloudWatch
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      environment: aws

# Security Configuration
security:
  public-endpoints: ${SECURITY_PUBLIC_ENDPOINTS:/auth/**,/actuator/health,/actuator/health/**,/product-type-config/**}
  cors:
    allowed-origins:
      - ${CORS_ALLOWED_ORIGIN_1:http://localhost:3000}
      - ${CORS_ALLOWED_ORIGIN_2:http://localhost:5173}
      - ${CORS_ALLOWED_ORIGIN_3:https://globalcmx.com}

# Logging Configuration para CloudWatch Logs
logging:
  level:
    root: INFO
    com.globalcmx: INFO
    org.springframework: INFO
    org.hibernate: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /var/log/globalcmx/application.log
    max-size: 10MB
    max-history: 30

# Event Sourcing Configuration
eventsourcing:
  snapshot:
    frequency: 10
    enabled: true

# CQRS Configuration
cqrs:
  eventual-consistency-delay: 100
  projection-retry:
    max-attempts: 3
    backoff-delay: 1000

# Plantillas Configuration - S3
plantillas:
  storage:
    path: s3://${AWS_S3_BUCKET:globalcmx-prod}-plantillas
    type: s3

# Accounting Rules Configuration - S3
accounting:
  rules:
    storage:
      path: s3://${AWS_S3_BUCKET:globalcmx-prod}-accounting-rules
      type: s3

# Document Storage Configuration - S3
documents:
  storage:
    provider: S3
    s3:
      enabled: true
      bucket: ${AWS_S3_BUCKET:globalcmx-documents}
      region: ${AWS_REGION:us-east-1}
      use-instance-credentials: true  # Use IAM role on EC2/EKS
      presigned-url-expiration-minutes: 60

# =============================================================================
# Real-Time Notifications - AWS API Gateway WebSocket
# =============================================================================
globalcmx:
  realtime:
    enabled: ${REALTIME_ENABLED:true}
    provider: WEBSOCKET
    websocket:
      api-id: ${AWS_WEBSOCKET_API_ID:}
      stage: ${AWS_WEBSOCKET_STAGE:prod}
      region: ${AWS_REGION:us-east-1}
      connection-table-name: ${AWS_WEBSOCKET_CONNECTION_TABLE:websocket-connections}
