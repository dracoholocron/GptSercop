<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#3182CE" />
    <meta name="description" content="GlobalCMX - Sistema de gestión de comercio exterior y trade finance" />

    <!-- iOS Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GlobalCMX" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <title>GlobalCMX</title>

    <style>
      body {
        margin: 0;
        padding: 0;
        /* Safe area insets manejados por componentes React */
      }

      /* Splash screen mientras carga */
      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #334155 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }

      #splash-screen.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      .splash-logo-container {
        position: relative;
        margin-bottom: 24px;
      }

      .splash-logo-ring {
        animation: rotate 20s linear infinite;
        transform-origin: center;
      }

      .splash-logo-pulse {
        animation: pulse-glow 3s ease-in-out infinite;
      }

      @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      @keyframes pulse-glow {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }

      @keyframes ping {
        0% { transform: scale(1); opacity: 1; }
        75%, 100% { transform: scale(2); opacity: 0; }
      }

      #splash-screen h1 {
        color: transparent;
        background: linear-gradient(to right, #93C5FD, #67E8F9, #5EEAD4);
        -webkit-background-clip: text;
        background-clip: text;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 2rem;
        font-weight: 700;
        margin: 0;
        letter-spacing: 3px;
      }

      #splash-screen p {
        color: rgba(148, 163, 184, 0.9);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 0.875rem;
        margin-top: 8px;
        font-weight: 500;
      }

      #splash-screen .tagline {
        color: rgba(100, 116, 139, 0.8);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 0.75rem;
        margin-top: 4px;
        font-style: italic;
      }

      .splash-loading {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 32px;
        padding: 8px 16px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .splash-dot {
        width: 8px;
        height: 8px;
        background: #22C55E;
        border-radius: 50%;
        box-shadow: 0 0 8px rgba(34, 197, 94, 0.6);
        animation: blink 1.5s ease-in-out infinite;
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }

      .splash-loading span {
        color: rgba(148, 163, 184, 0.8);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 0.75rem;
      }
    </style>
  </head>
  <body>
    <!-- Splash screen -->
    <div id="splash-screen">
      <!-- GCX Logo SVG -->
      <div class="splash-logo-container">
        <svg width="120" height="120" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="hexGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#60A5FA" />
              <stop offset="50%" stop-color="#38BDF8" />
              <stop offset="100%" stop-color="#2DD4BF" />
            </linearGradient>
            <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="2" result="coloredBlur" />
              <feMerge>
                <feMergeNode in="coloredBlur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>
          <!-- Background glow pulse -->
          <circle class="splash-logo-pulse" cx="50" cy="50" r="42" fill="none" stroke="rgba(96, 165, 250, 0.4)" stroke-width="1" opacity="0.5" />
          <!-- Outer rotating ring -->
          <g class="splash-logo-ring" style="transform-origin: 50px 50px;">
            <path d="M50 8 L85 27 L85 73 L50 92 L15 73 L15 27 Z" fill="none" stroke="url(#hexGradient)" stroke-width="2" stroke-linecap="round" stroke-dasharray="30 10" filter="url(#glow)" />
          </g>
          <!-- Inner hexagon -->
          <path d="M50 16 L78 32 L78 68 L50 84 L22 68 L22 32 Z" fill="rgba(15, 23, 42, 0.8)" stroke="url(#hexGradient)" stroke-width="1.5" />
          <!-- Corner nodes -->
          <circle cx="50" cy="16" r="3" fill="#60A5FA" filter="url(#glow)" />
          <circle cx="78" cy="32" r="2.5" fill="#38BDF8" filter="url(#glow)" />
          <circle cx="78" cy="68" r="2.5" fill="#38BDF8" filter="url(#glow)" />
          <circle cx="50" cy="84" r="3" fill="#2DD4BF" filter="url(#glow)" />
          <circle cx="22" cy="68" r="2.5" fill="#38BDF8" filter="url(#glow)" />
          <circle cx="22" cy="32" r="2.5" fill="#38BDF8" filter="url(#glow)" />
          <!-- Connecting lines -->
          <g opacity="0.3">
            <line x1="50" y1="50" x2="50" y2="20" stroke="#60A5FA" stroke-width="0.5" />
            <line x1="50" y1="50" x2="76" y2="35" stroke="#38BDF8" stroke-width="0.5" />
            <line x1="50" y1="50" x2="76" y2="65" stroke="#38BDF8" stroke-width="0.5" />
            <line x1="50" y1="50" x2="50" y2="80" stroke="#2DD4BF" stroke-width="0.5" />
            <line x1="50" y1="50" x2="24" y2="65" stroke="#38BDF8" stroke-width="0.5" />
            <line x1="50" y1="50" x2="24" y2="35" stroke="#38BDF8" stroke-width="0.5" />
          </g>
          <!-- GCX Text -->
          <text x="50" y="56" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#F1F5F9" letter-spacing="1">GCX</text>
          <!-- Underline accent -->
          <line x1="32" y1="62" x2="68" y2="62" stroke="url(#hexGradient)" stroke-width="1.5" stroke-linecap="round" opacity="0.7" />
        </svg>
      </div>

      <h1>GLOBAL CMX</h1>
      <p>Trade Finance Platform</p>
      <p class="tagline">Full visibility. Total control.</p>

      <div class="splash-loading">
        <div class="splash-dot"></div>
        <span>Loading...</span>
      </div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <!-- Service Worker Registration -->
    <script>
      // Ocultar splash screen cuando la app cargue
      window.addEventListener('load', () => {
        const splash = document.getElementById('splash-screen');
        if (splash) {
          setTimeout(() => {
            splash.classList.add('fade-out');
            setTimeout(() => splash.remove(), 300);
          }, 500);
        }
      });

      // Registrar Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered:', registration.scope);
            })
            .catch((error) => {
              console.log('SW registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
