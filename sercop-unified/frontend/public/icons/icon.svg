      <stop offset="0%" style="stop-color:#3182CE"/>
      <stop offset="100%" style="stop-color:#2B6CB0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- G Letter -->
