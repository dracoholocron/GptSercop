# ConfigMap de ejemplo (sin datos sensibles). En producción usar Secret para DATABASE_URL, REDIS_URL, JWT_SECRET, S3_*.
# CORS_ALLOWED_ORIGINS: opcional; en producción definir orígenes permitidos separados por coma.
apiVersion: v1
kind: ConfigMap
metadata:
  name: sercop-api-config
  labels:
    app: sercop-api
data:
  HOST: "0.0.0.0"
  PORT: "3080"
  NODE_ENV: "production"
  # CORS_ALLOWED_ORIGINS: "https://app.ejemplo.gob.ec,https://admin.ejemplo.gob.ec"
