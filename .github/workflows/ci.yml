# SERCOP V2 – CI: build, test, (opcional push de imagen)
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Audit
        run: npm run audit
        continue-on-error: true

  integration:
    runs-on: ubuntu-latest
    needs: build-and-test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sercop
          POSTGRES_PASSWORD: sercop
          POSTGRES_DB: sercop
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sercop -d sercop"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate --workspace=api

      - name: Push schema and seed
        run: npm run db:push --workspace=api -- --accept-data-loss && npm run db:seed
        env:
          DATABASE_URL: postgresql://sercop:sercop@localhost:5432/sercop

      - name: Build API
        run: npm run build --workspace=api

      - name: Start API
        run: node apps/api/dist/index.js &
        env:
          HOST: 0.0.0.0
          PORT: 3080
          DATABASE_URL: postgresql://sercop:sercop@localhost:5432/sercop
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-min-16-chars

      - name: Wait for API
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:3080/health && break
            sleep 2
          done
          curl -sf http://localhost:3080/health

      - name: Smoke test
        run: npm run smoke

      - name: Integration tests
        run: npm run test:integration --workspace=api
        env:
          INTEGRATION_BASE_URL: http://localhost:3080

      - name: Security tests
        run: npm run test:security --workspace=api
        env:
          INTEGRATION_BASE_URL: http://localhost:3080

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Admin E2E tests
        run: npx playwright test e2e/admin.spec.ts --config=playwright.admin.config.ts
        env:
          CI: true
          NEXT_PUBLIC_API_URL: http://localhost:3080

  # Build y push de imagen API en tags v* (GHCR)
  release-image:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sercop-api:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/sercop-api:latest
