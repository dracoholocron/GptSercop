# SERCOP V2 – entorno local (Fase 0: Redis + api; Docs/02_architecture)
# Uso: docker compose up -d  (npm run docker:up desde raíz)
# Requiere .env con DATABASE_URL y opcional REDIS_URL (por defecto redis://redis:6379)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sercop
      POSTGRES_PASSWORD: sercop
      POSTGRES_DB: sercop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sercop -d sercop"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      HOST: 0.0.0.0
      PORT: 3080
      JWT_SECRET: ${JWT_SECRET:-sercop-dev-secret-min-32-chars}
      DATABASE_URL: postgresql://sercop:sercop@postgres:5432/sercop
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: sercop-docs
    ports:
      - "3080:3080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  gateway:
    build:
      context: ./infra/gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - api

  # Portal público (opcional). Build desde raíz: docker compose build public-portal
  public-portal:
    build:
      context: .
      dockerfile: apps/public-portal/Dockerfile
    ports:
      - "3005:3001"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3080
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data:
