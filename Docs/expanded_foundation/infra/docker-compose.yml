# Expanded Foundation – referencia de infra (Postgres, Redis, MinIO)
# El proyecto actual usa su propio docker-compose.yml en la raíz; este archivo es documentación.

version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: sercop
      POSTGRES_USER: sercop
      POSTGRES_PASSWORD: sercop
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
